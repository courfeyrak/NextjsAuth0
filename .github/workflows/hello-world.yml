name: CI/CD Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

  deploy-dev:
    name: Deploy to DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Run Deploy DEV
        run: |
          echo "Deploying to DEV environment..."
          echo "Done!"

  deploy-qa:
    name: Deploy to QA
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Run Deploy QA
        run: |
          echo "Deploying to QA environment..."
          echo "Done!"

  deploy-prod:
    name: Deploy to PROD
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Run Deploy PROD
        run: |
          echo "Deploying to PROD environment..."
          echo "Done!"
